<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Tour de Gustave Eiffel</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --border: rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: linear-gradient(180deg, #0b1220 0%, #111827 100%); color: var(--text); }
    .app { display:grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
    aside { background: rgba(15,23,42,.92); border-right: 1px solid var(--border); padding: 18px; position: sticky; top:0; height:100vh; overflow:auto; }
    main { padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 1.35rem; line-height: 1.25; }
    .muted { color: var(--muted); font-size: .95rem; }
    .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin: 16px 0 18px; }
    input[type='search'], input[type='number'] { background: var(--panel-2); color: var(--text); border:1px solid var(--border); border-radius: 12px; padding: 10px 12px; }
    button, .btn { border:1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 12px; padding: 10px 14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
    button:hover, .btn:hover { border-color: rgba(245,158,11,.45); }
    .btn-primary { background: var(--accent); color: #111827; font-weight: 700; }
    .thumbs { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px; margin-top:16px; }
    .thumb { border:1px solid var(--border); border-radius: 14px; overflow:hidden; background: rgba(255,255,255,.02); cursor:pointer; }
    .thumb.active { outline:2px solid var(--accent); }
    .thumb img { width:100%; display:block; aspect-ratio: 0.72; object-fit:cover; background:#0b1220; }
    .thumb .cap { padding:8px 10px; font-size: .85rem; color: var(--muted); }
    .viewer-card { background: rgba(15,23,42,.55); border:1px solid var(--border); border-radius: 24px; padding: 18px; box-shadow: var(--shadow); }
    .viewer-top { display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom: 12px; }
    .viewer-top h2 { margin:0; font-size:1.1rem; }
    .stage { overflow:auto; background: rgba(255,255,255,.03); border-radius: 18px; padding: 18px; text-align:center; min-height: 70vh; }
    .page-img { max-width:100%; height:auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.45); transform-origin: top center; transition: transform .15s ease; }
    .bottom-panel { display:grid; grid-template-columns: 1.2fr .8fr; gap:16px; margin-top:16px; }
    .panel { background: rgba(255,255,255,.03); border:1px solid var(--border); border-radius: 18px; padding: 16px; }
    .panel h3 { margin:0 0 10px; font-size: 1rem; }
    #pageText { white-space: pre-wrap; line-height: 1.5; color: #e5e7eb; max-height: 250px; overflow:auto; }
    #results { display:flex; flex-direction:column; gap:8px; max-height: 300px; overflow:auto; }
    .result { padding:10px 12px; border-radius:12px; background: rgba(255,255,255,.04); cursor:pointer; border:1px solid transparent; }
    .result:hover { border-color: rgba(245,158,11,.35); }
    .kbd { font: inherit; padding: 2px 7px; border:1px solid var(--border); border-bottom-width:2px; border-radius:8px; background:#0b1220; color:var(--muted); }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height:auto; border-right:0; border-bottom:1px solid var(--border); }
      .bottom-panel { grid-template-columns: 1fr; }
      .thumbs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .thumbs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>La Tour de Gustave Eiffel</h1>
      <div class="muted"><span id="pageCount"></span> pages · visionneuse HTML interactive</div>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Rechercher dans le texte…" />
      </div>
      <div class="muted">Astuce : touches <span class="kbd">←</span> <span class="kbd">→</span> pour naviguer, <span class="kbd">+</span> <span class="kbd">-</span> pour zoomer.</div>
      <div id="thumbs" class="thumbs"></div>
    </aside>
    <main>
      <div class="viewer-card">
        <div class="viewer-top">
          <div>
            <h2 id="pageTitle">Page</h2>
            <div class="muted" id="pageMeta"></div>
          </div>
          <div class="toolbar">
            <button id="prevBtn">← Précédent</button>
            <button id="nextBtn">Suivant →</button>
            <label class="btn">Page <input id="pageInput" type="number" min="1" style="width:72px;margin-left:8px"></label>
            <button id="zoomOutBtn">− Zoom</button>
            <button id="zoomInBtn">＋ Zoom</button>
            <button id="fitBtn">Ajuster</button>
            <a class="btn btn-primary" href="histoire_tour.pdf" download>Télécharger le PDF</a>
          </div>
        </div>
        <div class="stage" id="stage">
          <img id="pageImage" class="page-img" alt="Page du document" />
        </div>
        <div class="bottom-panel">
          <section class="panel">
            <h3>Texte extrait</h3>
            <div id="pageText">Aucun texte disponible pour cette page.</div>
          </section>
          <section class="panel">
            <h3>Résultats de recherche</h3>
            <div id="results"><div class="muted">Tape un mot ou une expression pour retrouver une page.</div></div>
          </section>
        </div>
      </div>
    </main>
  </div>

<script>
let data = null;
let current = 1;
let zoom = 1;
const $ = (id) => document.getElementById(id);

function renderThumbs() {
  const thumbs = $('thumbs');
  thumbs.innerHTML = data.pages.map(p => `
    <div class="thumb ${p.num===current?'active':''}" data-page="${p.num}">
      <img loading="lazy" src="${p.img}" alt="Miniature page ${p.num}">
      <div class="cap">Page ${p.num}</div>
    </div>
  `).join('');
  thumbs.querySelectorAll('.thumb').forEach(el => el.addEventListener('click', () => goTo(+el.dataset.page)));
}

function renderPage() {
  const page = data.pages[current-1];
  $('pageTitle').textContent = data.title;
  $('pageMeta').textContent = `Page ${page.num} sur ${data.pageCount}`;
  $('pageInput').value = page.num;
  $('pageImage').src = page.img;
  $('pageImage').style.transform = `scale(${zoom})`;
  $('pageText').textContent = page.text || 'Aucun texte disponible pour cette page.';
  document.title = `${data.title} - Page ${page.num}`;
  renderThumbs();
  document.querySelector(`[data-page="${page.num}"]`)?.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function goTo(n) {
  if (n < 1 || n > data.pageCount) return;
  current = n;
  renderPage();
}

function search(q) {
  const results = $('results');
  q = q.trim().toLowerCase();
  if (!q) {
    results.innerHTML = '<div class="muted">Tape un mot ou une expression pour retrouver une page.</div>';
    return;
  }
  const matches = data.pages.filter(p => (p.text || '').toLowerCase().includes(q)).slice(0, 50);
  if (!matches.length) {
    results.innerHTML = '<div class="muted">Aucun résultat.</div>';
    return;
  }
  results.innerHTML = matches.map(p => {
    const txt = (p.text || '').replace(/\s+/g,' ').trim();
    const idx = txt.toLowerCase().indexOf(q);
    const excerpt = idx >= 0 ? txt.slice(Math.max(0, idx-55), idx+160) : txt.slice(0, 180);
    return `<div class="result" data-page="${p.num}"><strong>Page ${p.num}</strong><br><span class="muted">${excerpt.replaceAll('<','&lt;')}</span></div>`;
  }).join('');
  results.querySelectorAll('.result').forEach(el => el.addEventListener('click', ()=> goTo(+el.dataset.page)));
}

fetch('pages.json').then(r => r.json()).then(json => {
  data = json;
  $('pageCount').textContent = data.pageCount;
  renderPage();
  const params = new URLSearchParams(location.search);
  const p = +params.get('page');
  if (p) goTo(p);
});

$('prevBtn').addEventListener('click', ()=> goTo(current-1));
$('nextBtn').addEventListener('click', ()=> goTo(current+1));
$('pageInput').addEventListener('change', (e)=> goTo(+e.target.value));
$('zoomInBtn').addEventListener('click', ()=> { zoom = Math.min(3, +(zoom + 0.1).toFixed(2)); renderPage(); });
$('zoomOutBtn').addEventListener('click', ()=> { zoom = Math.max(0.5, +(zoom - 0.1).toFixed(2)); renderPage(); });
$('fitBtn').addEventListener('click', ()=> { zoom = 1; renderPage(); });
$('searchInput').addEventListener('input', (e)=> search(e.target.value));

document.addEventListener('keydown', (e)=> {
  if (e.key === 'ArrowRight') goTo(current+1);
  if (e.key === 'ArrowLeft') goTo(current-1);
  if (e.key === '+' || e.key === '=') { zoom = Math.min(3, +(zoom + 0.1).toFixed(2)); renderPage(); }
  if (e.key === '-') { zoom = Math.max(0.5, +(zoom - 0.1).toFixed(2)); renderPage(); }
});
</script>
</body>
</html>
